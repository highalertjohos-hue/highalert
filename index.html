<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High Alert Medication Analyzer</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- PDF.js Stable -->
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>

<!-- Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<nav class="navbar">
<div class="logo">💊 HAMA</div>
</nav>

<div class="hero">

<h1>High Alert Medication Analyzer</h1>

<p>Upload Hospital Drug Distribution List</p>

</div>

<div class="upload-section">

<input
type="file"
id="pdfFile"
accept=".pdf"
style="display:none"
>

<div class="upload-box" id="dropZone">

<h2 id="fileName">

Choose PDF

</h2>

<button
type="button"
id="chooseFile"
>

Browse PDF

</button>

</div>

<button
type="button"
class="analyze"
id="analyzeBtn"
>

Analyze

</button>

</div>

<div class="summary">

<div class="card">

<h2 id="patientCount">0</h2>

<span>Patients</span>

</div>

<div class="card">

<h2 id="drugCount">0</h2>

<span>Drugs</span>

</div>

<div class="card danger">

<h2 id="highAlertCount">0</h2>

<span>High Alert</span>

</div>

</div>

<div class="results">

<table id="resultTable">

<thead>

<tr>

<th>Patient</th>

<th>File</th>

<th>Ward</th>

<th>Drug</th>

<th>Generic</th>

<th>Category</th>

<th>Status</th>

</tr>

</thead>

<tbody>

<tr>

<td colspan="7">

No Data

</td>

</tr>

</tbody>

</table>

</div>

<script src="app.js"></script>

</body>
</html>
